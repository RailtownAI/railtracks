[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "railtracks"
authors = [
    { name = "Logan Underwood", email = "logan@railtown.ai" },
    { name = "Levi Varsanyi", email = "levi@railtown.ai" },
    { name = "Jaime Bueza", email = "jaime@railtown.ai" },
    { name = "Amir Refaee", email = "amir@railtown.ai" },
    { name = "Aryan Ballani", email = "aryan@railtown.ai" },
    { name = "Tristan Brown", email = "tristan@railtown.ai" },
    { name = "Pooria Ashrafian", email = "pooria@railtown.ai" }
]
readme = "README.md"
license = { file = "LICENSE" }
dynamic = ["version", "description"]
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Environment :: Console",
    "Typing :: Typed",
]
dependencies = [
    "colorama >= 0.4.6",
    "litellm >= 1.83.0, <= 1.83.14",
    "mcp >= 1.23.0, <2",
    "pydantic >= 2.5.3, <3",
    "python-dotenv >= 1.0.0",
    "PyYAML >= 6.0",
    "rich>=13.7.1",
]

[project.optional-dependencies]
visual = [
    "fastapi >= 0.121.0",
    "uvicorn[standard] >= 0.24.0",
]
# For each Integration package dependencies go here.
portkey = ["portkey_ai >= 2.0.2"]

# Retrieval-stack extras. These are not pulled in by `[all]` — install
# `railtracks[retrieval]` to opt in.
tiktok = ["tiktoken>=0.10.0, <=0.12.0"]
pdf = ["pypdf >= 4.0.0, <= 6.10.2"]
ocr = [
    "pypdfium2 >= 4.30.0",
    "pytesseract >= 0.3.10",
    "pillow >= 10.0.0",
    "pypdf >= 4.0.0, <= 6.10.2",
]
huggingface = ["datasets >= 2.14.0, <= 4.8.5"]
chroma = [
    "chromadb >= 1.3.0",
    "pdfplumber >= 0.10.1",
]
aws = ["boto3 >= 1.26.0"]
azure-blob = [
    "azure-core >= 1.30.0",
    "azure-identity >= 1.15.0",
    "azure-storage-blob >= 12.0.0",
]
gcp = ["google-cloud-storage >= 2.0.0"]
sql = ["sqlalchemy >= 2.0.0"]
stores-vector = ["asyncpg>=0.29", "pgvector>=0.3"]
stores-chroma = ["chromadb>1.3.0"]
stores-all = ["railtracks[stores-vector]", "railtracks[stores-chroma]"]

# Minimum needed for the retrieval pipeline (chunking, embedding, in-memory
# store, basic local-file loaders). No cloud connectors, no heavy backends.
retrieval-core = [
    "railtracks[tiktok]",
    "railtracks[pdf]",
    "numpy >= 1.24",
]

# Kitchen-sink retrieval install: core + every loader/store/integration.
retrieval = [
    "railtracks[retrieval-core]",
    "railtracks[ocr]",
    "railtracks[huggingface]",
    "railtracks[chroma]",
    "railtracks[aws]",
    "railtracks[azure-blob]",
    "railtracks[gcp]",
    "railtracks[sql]",
    "railtracks[stores-all]",
]

all = ["railtracks[visual]", "railtracks[portkey]"]

[project.scripts]
railtracks = "railtracks.cli:main"

[project.urls]
documentation = "https://docs.railtracks.org/"
"Release Notes" = "https://github.com/RailtownAI/railtracks/releases"
repository = "https://github.com/RailtownAI/railtracks"
home = "https://railtracks.org"

[tool.flit.module]
name = "railtracks"

[tool.flit.sdist]
include = ["docs/", "README.md", "LICENSE"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
