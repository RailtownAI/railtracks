[build-system]
requires = ["flit_core >=3.2,<4"]
build-backend = "flit_core.buildapi"

[project]
name = "railtracks"
authors = [
    { name = "Logan Underwood", email = "logan@railtown.ai" },
    { name = "Levi Varsanyi", email = "levi@railtown.ai" },
    { name = "Jaime Bueza", email = "jaime@railtown.ai" },
    { name = "Amir Refaee", email = "amir@railtown.ai" },
    { name = "Aryan Ballani", email = "aryan@railtown.ai" },
    { name = "Tristan Brown", email = "tristan@railtown.ai" },
    { name = "Pooria Ashrafian", email = "pooria@railtown.ai" }
]
readme = "README.md"
license = { file = "LICENSE" }
dynamic = ["version", "description"]
requires-python = ">=3.10"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Development Status :: 4 - Beta",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Natural Language :: English",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Environment :: Console",
    "Typing :: Typed",
]
dependencies = [
    "colorama >= 0.4.6",
    "litellm >= 1.83.0, <= 1.83.14",
    "mcp >= 1.23.0, <2",
    "pydantic >= 2.5.3, <3",
    "python-dotenv >= 1.0.0",
    "PyYAML >= 6.0",
]

[project.optional-dependencies]
visual = [
    "fastapi >= 0.121.0",
    "uvicorn[standard] >= 0.24.0",
]
# cli and chat both require the visual extras (may diverge in future)
cli = ["railtracks[visual]"]
chat = ["railtracks[visual]"]
chroma = [
    "chromadb >= 1.3.0",
    "pdfplumber >= 0.10.1",
]
portkey = ["portkey_ai >= 2.0.2"]
integrations = ["railtracks[portkey]", "railtracks[chroma]"]
all = ["railtracks[visual]", "railtracks[integrations]"]

[project.scripts]
railtracks = "railtracks.cli:main"

[project.urls]
documentation = "https://docs.railtracks.org/"
"Release Notes" = "https://github.com/RailtownAI/railtracks/releases"
repository = "https://github.com/RailtownAI/railtracks"
home = "https://railtracks.org"

[tool.flit.module]
name = "railtracks"

[tool.flit.sdist]
include = ["docs/", "README.md", "LICENSE"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
