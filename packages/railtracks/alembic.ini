# Alembic config for railtracks persistence.
# The actual database URL is computed at runtime in env.py from
# resolve_railtracks_home(). `sqlalchemy.url` here is a placeholder
# so Alembic can parse the file.

[alembic]
script_location = src/railtracks/persistence/migrations
prepend_sys_path = src
sqlalchemy.url = sqlite:///placeholder.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
