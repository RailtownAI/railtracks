name: "❓ General"
description: "Tech debt, API concerns, documentation feedback, feature ideas, questions"
title: ""

body:
  - type: textarea
    id: description
    attributes:
      label: What's on your mind?
      description: >
        Tech debt, API design concern, docs gap, feature idea, general question —
        anything goes here.
      placeholder: How do I configure railtracks to work offline?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that will help us understand your query, concern, or suggestion.
      placeholder: Related documentation, links, or examples.
    validations:
      required: false
