name: "❓ General / Concern"
description: "Tech debt, API concerns, documentation feedback, feature ideas, questions, or anything else that doesn't fit Bug/Feature/Task."
title: "[General] "

body:
  - type: textarea
    id: description
    attributes:
      label: What's on your mind?
      description: >
        Tech debt, API design concern, docs gap, feature idea, general question —
        anything goes here. A maintainer will re-triage into a Feature/Task/Bug if it
        needs its own tracked issue.
      placeholder: How do I configure railtracks to work offline?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other information that will help us understand your query, concern, or suggestion.
      placeholder: Related documentation, links, or examples.
    validations:
      required: false
