site_name: Railtracks Docs
site_url: https://railtownai.github.io/railtracks/
site_description: "Railtracks is a framework for building LLM-powered agents and applications."

repo_name: railtracks
repo_url: https://github.com/RailtownAI/railtracks/



theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg

  custom_dir: docs/overrides

  palette:
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-5
        name: Switch to light mode

    - scheme: default
      primary: white
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.prefetch
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy
    - content.code.highlight
    - content.code.annotate

plugins:
  - search

markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
      line_spans: __span

extra_css:
  - css/extra.css

extra:
  generator: false

